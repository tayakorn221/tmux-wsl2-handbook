# ============================================================================
# ~/.tmux.conf — Personal tmux configuration for WSL2 + dev workflow
# ----------------------------------------------------------------------------
# Tested on: Ubuntu 22.04/24.04 + tmux 3.2a/3.4
# Apply changes: prefix + r   (binding defined below)
# ============================================================================


# ----- Prefix key -----------------------------------------------------------

# Unbind default prefix (Ctrl+b) so it does not conflict with the new one.
unbind C-b

# Use Ctrl+a as the prefix instead of Ctrl+b.
# Why: Ctrl+b clashes with "move cursor back" in bash/zsh/Emacs/Claude Code.
#      Ctrl+a is the GNU Screen convention and is far more ergonomic on the
#      left hand. The trade-off (loses bash "go to line start") is acceptable
#      because we can rebind it inside tmux if ever needed.
set-option -g prefix C-a

# Allow "prefix + Ctrl+a" to send a literal Ctrl+a to the inner program.
# Useful when a nested shell/editor actually needs Ctrl+a.
bind C-a send-prefix


# ----- General behaviour ----------------------------------------------------

# Start window and pane numbering at 1 instead of 0.
# Why: the "0" key sits on the far right of the number row, away from "1-9".
#      Indexing from 1 keeps the keyboard order matching the window order.
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Renumber windows automatically when one is closed (so gaps don't appear).
set-option -g renumber-windows on

# Enable mouse: click to focus pane/window, drag border to resize,
# scroll wheel to enter copy-mode and scroll history.
set-option -g mouse on

# Set scrollback buffer to 50,000 lines per pane.
# Why: dbt runs, docker logs, and compiler output easily exceed default 2000.
set-option -g history-limit 50000

# Reduce the delay after pressing the escape key.
# Why: default 500ms makes Vim/Neovim feel laggy when leaving insert mode.
set-option -sg escape-time 10

# Increase the time tmux waits for repeated keys (for resize bindings).
set-option -g repeat-time 600

# Send focus events to inner programs (Neovim auto-reload, etc.).
set-option -g focus-events on

# Use 256-color + true-color terminal capabilities.
# Why: makes Neovim/bat/lazygit themes render correctly inside tmux.
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:RGB"


# ----- Reload config --------------------------------------------------------

# prefix + r  reloads ~/.tmux.conf without restarting tmux.
# The display-message prints confirmation so you know it worked.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"


# ----- Splitting panes ------------------------------------------------------

# Unbind defaults that are non-mnemonic ('"' and '%').
unbind '"'
unbind %

# prefix + |   split vertically (new pane to the right)
# prefix + -   split horizontally (new pane below)
# -c "#{pane_current_path}" makes the new pane inherit the CWD of the current
# one. Why: avoids the constant "cd back to project root" dance.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window also inherits the current path.
bind c new-window -c "#{pane_current_path}"


# ----- Pane navigation (vim-style h/j/k/l) ----------------------------------

# prefix + h/j/k/l  to move between panes (left/down/up/right).
# Mirrors Vim/Neovim window navigation so muscle memory transfers.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# ----- Pane resizing --------------------------------------------------------

# prefix + H/J/K/L  (capital) to resize. The -r flag makes the key repeatable
# without re-pressing prefix, so you can hold to grow/shrink quickly.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ----- Window navigation ----------------------------------------------------

# prefix + Tab     go to last-used window
# prefix + Space   cycle through preset layouts (even-h, even-v, main-h, ...)
bind Tab last-window


# ----- Copy mode (vi-style) -------------------------------------------------

# Use vi keybindings inside copy-mode (prefix + [ to enter).
# h/j/k/l to move, /  to search, v to start selection, y to yank.
set-window-option -g mode-keys vi

# v  starts a character-wise selection (matches Vim's visual mode).
bind -T copy-mode-vi v send-keys -X begin-selection

# y  yanks selection to the tmux buffer AND to the system clipboard.
# In WSL2, clip.exe is the Windows clipboard bridge — text yanked here
# becomes pasteable in any Windows app (Chrome, Notion, VS Code, etc.).
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"

# Mouse-drag selection also pipes to Windows clipboard on release.
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"


# ----- Status bar -----------------------------------------------------------

# Refresh status line every 5 seconds (default 15).
set-option -g status-interval 5

# Status bar position: bottom (default). Set to "top" if you prefer.
set-option -g status-position bottom

# Left side: session name in bold, fixed width.
set-option -g status-left-length 30
set-option -g status-left "#[bold] #S #[default]| "

# Right side: hostname + date + time. Useful when SSH-hopping into the WSL
# instance from another machine.
set-option -g status-right-length 60
set-option -g status-right "#[fg=cyan]#H #[fg=default]| %Y-%m-%d %H:%M "

# Window list: highlight current window, dim the rest.
set-window-option -g window-status-current-style "bold,fg=black,bg=cyan"
set-window-option -g window-status-style "fg=white"

# Subtle pane border colours: active pane gets a brighter border so you can
# always see at a glance which pane has focus.
set-option -g pane-border-style "fg=brightblack"
set-option -g pane-active-border-style "fg=cyan"


# ----- Activity monitoring --------------------------------------------------

# Show a marker in the status bar when a background window has new output.
# Useful for long-running builds / npm dev servers in another window.
set-window-option -g monitor-activity on
set-option -g visual-activity off


# ----- Quality of life ------------------------------------------------------

# prefix + S   prompt for a new session name and create it.
bind S command-prompt -p "New session name:" "new-session -s '%%'"

# prefix + K   kill the current session (with confirmation).
bind K confirm-before -p "Kill session #S? (y/n)" kill-session

# prefix + X   kill the current pane (with confirmation).
bind X confirm-before -p "Kill pane #P? (y/n)" kill-pane
